<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Задачи</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #e8e0d0;
    --red: #ff4d4d;
    --amber: #f5a623;
    --green: #4caf7d;
    --blue: #5b9cf6;
    --pink: #e06b8b;
    --purple: #9b7fe8;
    --teal: #4db6ac;
    --coral: #e07a5f;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 20px 16px 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 0.5px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header-meta {
    font-size: 12px;
    color: var(--text3);
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .stat {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    border: 0.5px solid var(--border);
  }

  .stat-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Golos Text', sans-serif;
    cursor: pointer;
    transition: all .15s;
  }

  .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border2);
  }

  /* Task list */
  .task-list {
    padding: 12px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: all .2s;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item.done {
    opacity: 0.38;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--text3);
  }

  .check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all .2s;
    background: transparent;
  }

  .check.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .check.checked::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-left: none;
    border-top: none;
    transform: rotate(45deg) translateY(-1px);
  }

  .task-body {
    flex: 1;
    min-width: 0;
  }

  .task-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .prio-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tag {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 6px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .tag-фск    { background: rgba(77,182,172,0.15); color: var(--teal); }
  .tag-crm    { background: rgba(91,156,246,0.15); color: var(--blue); }
  .tag-ai     { background: rgba(155,127,232,0.15); color: var(--purple); }
  .tag-личное { background: rgba(136,136,136,0.15); color: var(--text2); }
  .tag-проект { background: rgba(245,166,35,0.15); color: var(--amber); }
  .tag-партнёр{ background: rgba(224,107,139,0.15); color: var(--pink); }
  .tag-цены   { background: rgba(224,122,95,0.15); color: var(--coral); }

  .del-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text3);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    margin-top: -2px;
  }

  .del-btn:active {
    background: rgba(255,77,77,0.15);
    color: var(--red);
  }

  /* Add task panel */
  .add-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border2);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 20;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .add-input {
    flex: 1;
    height: 40px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: 14px;
    font-family: 'Golos Text', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  .add-input::placeholder { color: var(--text3); }
  .add-input:focus { border-color: rgba(255,255,255,0.3); }

  .add-btn {
    height: 40px;
    padding: 0 16px;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Golos Text', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity .15s;
  }

  .add-btn:active { opacity: 0.8; }

  .add-selects {
    display: flex;
    gap: 8px;
  }

  .add-select {
    flex: 1;
    height: 34px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 8px;
    font-size: 12px;
    font-family: 'Golos Text', sans-serif;
    color: var(--text2);
    outline: none;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--text3);
    font-size: 14px;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  /* Priority dots */
  .high { background: var(--red); }
  .mid  { background: var(--amber); }
  .low  { background: var(--green); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Задачи</h1>
    <span class="header-meta" id="date-str"></span>
  </div>
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-f="all">Все</button>
    <button class="filter-btn" data-f="active">Активные</button>
    <button class="filter-btn" data-f="done">Выполненные</button>
    <button class="filter-btn" data-f="high">Срочные</button>
  </div>
</div>

<div class="task-list" id="task-list"></div>

<div class="add-panel">
  <div class="add-row">
    <input class="add-input" id="new-task" type="text" placeholder="Новая задача...">
    <button class="add-btn" id="add-btn">+</button>
  </div>
  <div class="add-selects">
    <select class="add-select" id="new-tag">
      <option value="проект">Проект</option>
      <option value="фск">ФСК</option>
      <option value="crm">CRM</option>
      <option value="ai">AI</option>
      <option value="партнёр">Партнёр</option>
      <option value="цены">Цены</option>
      <option value="личное">Личное</option>
    </select>
    <select class="add-select" id="new-prio">
      <option value="high">Срочно</option>
      <option value="mid">Средний</option>
      <option value="low">Низкий</option>
    </select>
  </div>
</div>

<script>
// Telegram Web App init
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f0f0f');
  tg.setBackgroundColor('#0f0f0f');
}

// Storage
const STORAGE_KEY = 'tasks_v1';

const DEFAULT_TASKS = [
  {id:1, text:'Отправить видео в ФСК', tag:'фск', prio:'high', done:false},
  {id:2, text:'Взять контакт коллег из ФСК про меблированный дом', tag:'фск', prio:'mid', done:false},
  {id:3, text:'Подключить FB к AmoCRM', tag:'crm', prio:'high', done:false},
  {id:4, text:'Выделить час в расписании для AI-автоматизаций', tag:'ai', prio:'mid', done:false},
  {id:5, text:'Подготовка к встрече с MR Group', tag:'проект', prio:'high', done:false},
  {id:6, text:'Начать делать Финкенберг', tag:'проект', prio:'mid', done:false},
  {id:7, text:'Ответить Яндексу по программе корп. лояльности', tag:'партнёр', prio:'high', done:false},
  {id:8, text:'Обновить политику ценообразования', tag:'цены', prio:'mid', done:false}
];

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return DEFAULT_TASKS;
}

function saveTasks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
}

let tasks = loadTasks();
let nextId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 9;
let filter = 'all';

// Date
const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const now = new Date();
document.getElementById('date-str').textContent =
  `${now.getDate()} ${months[now.getMonth()]}, ${days[now.getDay()]}`;

function render() {
  let filtered = tasks;
  if (filter === 'active') filtered = tasks.filter(t => !t.done);
  else if (filter === 'done') filtered = tasks.filter(t => t.done);
  else if (filter === 'high') filtered = tasks.filter(t => t.prio === 'high' && !t.done);

  const list = document.getElementById('task-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">✓</div>Нет задач</div>`;
  } else {
    list.innerHTML = filtered.map(t => `
      <div class="task-item${t.done ? ' done' : ''}" data-id="${t.id}">
        <div class="check${t.done ? ' checked' : ''}" onclick="toggle(${t.id})"></div>
        <div class="task-body">
          <div class="task-text">${escHtml(t.text)}</div>
          <div class="task-meta">
            <div class="prio-dot ${t.prio}"></div>
            <span class="tag tag-${t.tag}">${t.tag.toUpperCase()}</span>
          </div>
        </div>
        <button class="del-btn" onclick="remove(${t.id})">×</button>
      </div>
    `).join('');
  }

  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const active = total - done;
  const urgent = tasks.filter(t => t.prio === 'high' && !t.done).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Всего</div></div>
    <div class="stat"><div class="stat-val">${active}</div><div class="stat-lbl">Актив</div></div>
    <div class="stat"><div class="stat-val">${done}</div><div class="stat-lbl">Готово</div></div>
    <div class="stat"><div class="stat-val">${urgent}</div><div class="stat-lbl">Срочных</div></div>
  `;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggle(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); render(); }
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function remove(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    filter = b.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
});

document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('new-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function addTask() {
  const txt = document.getElementById('new-task').value.trim();
  if (!txt) return;
  tasks.unshift({
    id: nextId++,
    text: txt,
    tag: document.getElementById('new-tag').value,
    prio: document.getElementById('new-prio').value,
    done: false
  });
  document.getElementById('new-task').value = '';
  saveTasks();
  render();
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

render();
</script>
</body>
</html>
